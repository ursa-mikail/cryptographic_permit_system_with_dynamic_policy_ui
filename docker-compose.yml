name: permit-authority

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: permit-authority-backend
    restart: unless-stopped
    environment:
      - PORT=8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - permit-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: permit-authority-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - permit-net

networks:
  permit-net:
    name: permit-authority-network
    driver: bridge
